<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Riverside Home">
    <title>Riverside Home</title>
    <circle cx="100" cy="100" r="96" fill="#0D1F33"/>
    <!-- 3 gabled roofs: left, center (taller), right -->
    <polygon points="56,39 34,72 78,72" fill="#c9a84c" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="100,34 78,72 122,72" fill="#c9a84c" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="144,39 122,72 166,72" fill="#c9a84c" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <!-- Chimney on center unit -->
    <rect x="107" y="26" width="8" height="16" rx="1" fill="white"/>
    <!-- Building body -->
    <rect x="34" y="72" width="132" height="48" fill="#0a1c2e" stroke="white" stroke-width="2"/>
    <!-- Unit dividers -->
    <line x1="78" y1="72" x2="78" y2="120" stroke="white" stroke-width="1.5"/>
    <line x1="122" y1="72" x2="122" y2="120" stroke="white" stroke-width="1.5"/>
    <!-- Floor dividers -->
    <line x1="34" y1="88" x2="166" y2="88" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="34" y1="104" x2="166" y2="104" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <!-- Top floor windows (2 per unit) -->
    <rect x="41" y="75" width="11" height="10" rx="1" fill="#c9a84c"/>
    <rect x="55" y="75" width="11" height="10" rx="1" fill="#c9a84c"/>
    <rect x="85" y="75" width="11" height="10" rx="1" fill="#c9a84c"/>
    <rect x="99" y="75" width="11" height="10" rx="1" fill="#c9a84c"/>
    <rect x="129" y="75" width="11" height="10" rx="1" fill="#c9a84c"/>
    <rect x="143" y="75" width="11" height="10" rx="1" fill="#c9a84c"/>
    <!-- Mid floor windows (2 per unit) -->
    <rect x="41" y="91" width="11" height="10" rx="1" fill="#c9a84c"/>
    <rect x="55" y="91" width="11" height="10" rx="1" fill="#c9a84c"/>
    <rect x="85" y="91" width="11" height="10" rx="1" fill="#c9a84c"/>
    <rect x="99" y="91" width="11" height="10" rx="1" fill="#c9a84c"/>
    <rect x="129" y="91" width="11" height="10" rx="1" fill="#c9a84c"/>
    <rect x="143" y="91" width="11" height="10" rx="1" fill="#c9a84c"/>
    <!-- Ground floor doors (centered per unit) -->
    <rect x="51" y="107" width="10" height="13" rx="1" fill="white"/>
    <rect x="95" y="107" width="10" height="13" rx="1" fill="white"/>
    <rect x="139" y="107" width="10" height="13" rx="1" fill="white"/>
    <!-- River waves -->
    <path d="M40,128 C52,121 64,135 76,128 C88,121 100,135 112,128 C124,121 136,135 148,128 C157,123 163,130 163,128" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M40,138 C52,131 64,145 76,138 C88,131 100,145 112,138 C124,131 136,145 148,138 C157,133 163,140 163,138" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Text -->
    <text x="100" y="157" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5">RIVERSIDE HOME</text>
</svg>
